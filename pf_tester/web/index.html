<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenAI Privacy Filter — Tester</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <div>
      <h1>OpenAI Privacy Filter</h1>
      <p class="muted" id="meta">Loading…</p>
    </div>
    <div class="header-actions">
      <button id="theme_toggle" type="button" class="ghost" title="Toggle theme" aria-label="Toggle theme">
        <span id="theme_icon">◐</span>
      </button>
    </div>
  </header>

  <main>
    <section class="panel" id="dropzone">
      <div class="row">
        <label for="sample">Sample:</label>
        <select id="sample"><option value="">— pick one —</option></select>

        <button id="upload_btn" type="button" class="ghost">Upload file…</button>
        <input id="upload" type="file" accept=".txt,.md,.log,.csv,.json,.html,.xml,.yml,.yaml,text/*" hidden />

        <div class="spacer"></div>
        <span id="filename" class="muted"></span>
        <button id="clear" type="button" class="ghost">Clear</button>
      </div>

      <textarea id="input" rows="10" spellcheck="false"
                placeholder="Paste text, drop a file, or pick a sample…"></textarea>

      <div class="row">
        <label for="mode">Mode:</label>
        <select id="mode">
          <option value="tag">[ENTITY_TYPE] tag</option>
          <option value="placeholder">Custom placeholder</option>
          <option value="mask_char" selected>Mask char (preserve length)</option>
        </select>
        <input id="mode_value" type="text" maxlength="32" value="*" />

        <label for="min_score" class="ml">Min score:</label>
        <input id="min_score" type="number" min="0" max="1" step="0.05" value="0.5" />

        <label class="checkbox">
          <input id="ru_postpass" type="checkbox" checked /> RU regex post-pass
        </label>

        <div class="spacer"></div>
        <button id="run" type="button" class="primary">Redact</button>
        <button id="detect_only" type="button">Detect only</button>
      </div>

      <p id="status" class="muted"></p>
    </section>

    <section class="panel">
      <div class="row tight">
        <h2>Highlighted input</h2>
      </div>
      <pre id="highlight" class="output"></pre>
    </section>

    <section class="panel">
      <div class="row tight">
        <h2>Redacted output</h2>
        <div class="spacer"></div>
        <button id="copy_redacted" type="button" class="ghost">Copy</button>
        <button id="download_txt" type="button" class="ghost">Download .txt</button>
        <button id="download_json" type="button" class="ghost">Download .json</button>
      </div>
      <pre id="redacted" class="output"></pre>
    </section>

    <section class="panel">
      <h2>Detected spans</h2>
      <table id="spans">
        <thead><tr><th>Entity</th><th>Text</th><th>Range</th><th>Score</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
