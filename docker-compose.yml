services:
  pf-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: pf-tester:cpu
    container_name: pf-tester
    ports:
      - "8000:8000"
    environment:
      PF_MODEL: ${PF_MODEL:-openai/privacy-filter}
      PF_DEVICE: ${PF_DEVICE:-cpu}
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

  # Optional CLI runner: `docker compose run --rm pf-cli --suite`
  pf-cli:
    image: pf-tester:cpu
    profiles: ["cli"]
    depends_on:
      - pf-service
    environment:
      PF_MODEL: ${PF_MODEL:-openai/privacy-filter}
      PF_DEVICE: ${PF_DEVICE:-cpu}
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
    volumes:
      - hf_cache:/root/.cache/huggingface
    entrypoint: ["python", "-m", "pf_tester.cli"]
    command: ["--suite"]

  # Optional GPU profile: `docker compose --profile gpu up pf-service-gpu`
  # Requires NVIDIA Container Toolkit on the host.
  pf-service-gpu:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu121
    image: pf-tester:gpu
    container_name: pf-tester-gpu
    profiles: ["gpu"]
    ports:
      - "8000:8000"
    environment:
      PF_MODEL: ${PF_MODEL:-openai/privacy-filter}
      PF_DEVICE: ${PF_DEVICE:-cuda:0}
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  hf_cache:
